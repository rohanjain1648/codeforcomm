services:
  - type: web
    name: kisan-alert-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLOUD_API_KEY
        sync: false
      - key: EE_SERVICE_ACCOUNT_EMAIL
        sync: false
